<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бурмалдатский Переводчик</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(233, 69, 96, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            50% { transform: translateY(-100vh) translateX(100px) rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(233, 69, 96, 0.1),
                        inset 0 0 60px rgba(233, 69, 96, 0.05);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(233, 69, 96, 0.2),
                        inset 0 0 80px rgba(233, 69, 96, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .title {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .translator-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .label-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #e94560; }
            50% { box-shadow: 0 0 25px #e94560, 0 0 50px #e94560; }
        }

        .output-label .label-icon {
            background: #ffd93d;
            box-shadow: 0 0 10px #ffd93d;
            animation: pulse-yellow 2s infinite;
        }

        @keyframes pulse-yellow {
            0%, 100% { box-shadow: 0 0 10px #ffd93d; }
            50% { box-shadow: 0 0 25px #ffd93d, 0 0 50px #ffd93d; }
        }

        textarea {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            resize: vertical;
            min-height: 130px;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #outputText {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 215, 0, 0.2);
            cursor: default;
        }

        #outputText:focus {
            border-color: #ffd93d;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-translate {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            flex: 1;
            min-width: 200px;
        }

        .btn-translate:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.6);
        }

        .btn-translate:active {
            transform: translateY(0);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffd93d;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            transform: translateY(-3px);
        }

        .btn-clear {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .btn-clear:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-3px);
        }

        .copy-notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background: #ffd93d;
            color: #1a1a2e;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd93d;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
                border-radius: 25px;
            }
            .title {
                font-size: 36px;
            }
            .btn {
                padding: 14px 28px;
                font-size: 15px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: flex-start;
                padding-top: 30px;
            }
            .container {
                padding: 20px;
                border-radius: 20px;
            }
            .header {
                margin-bottom: 25px;
            }
            .title {
                font-size: 28px;
                letter-spacing: 1px;
            }
            .translator-box {
                gap: 15px;
            }
            .label {
                font-size: 12px;
                letter-spacing: 0.5px;
            }
            textarea {
                font-size: 14px;
                padding: 15px;
                min-height: 110px;
                border-radius: 15px;
            }
            .button-group {
                gap: 10px;
            }
            .btn {
                padding: 12px 20px;
                font-size: 13px;
                letter-spacing: 0.5px;
                border-radius: 40px;
            }
            .btn-translate {
                min-width: 100%;
                order: -1;
            }
            .btn-copy, .btn-clear {
                flex: 1;
            }
            .stats {
                gap: 20px;
                margin-top: 15px;
            }
            .stat-value {
                font-size: 20px;
            }
            .stat-label {
                font-size: 10px;
            }
            .copy-notification {
                top: 20px;
                padding: 12px 25px;
                font-size: 14px;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 5px;
                padding-top: 20px;
            }
            .container {
                padding: 15px;
                border-radius: 15px;
            }
            .title {
                font-size: 24px;
            }
            .header {
                margin-bottom: 20px;
            }
            textarea {
                font-size: 13px;
                padding: 12px;
                min-height: 90px;
                border-radius: 12px;
            }
            .btn {
                padding: 10px 15px;
                font-size: 12px;
                letter-spacing: 0;
            }
            .label {
                font-size: 11px;
            }
            .stat-value {
                font-size: 18px;
            }
        }

        @media (max-width: 850px) and (orientation: landscape) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            .container {
                padding: 20px;
                max-width: 600px;
            }
            textarea {
                min-height: 80px;
            }
            .translator-box {
                gap: 10px;
            }
            .header {
                margin-bottom: 15px;
            }
            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="copy-notification" id="notification">✅ Скопировано в буфер!</div>

    <div class="container">
        <div class="header">
            <h1 class="title">БУРМАЛДАТСКИЙ</h1>
        </div>

        <div class="translator-box">
            <div class="input-group">
                <div class="label">
                    <span class="label-icon"></span>
                    Введи текст на русском
                </div>
                <textarea 
                    id="inputText" 
                    placeholder="Пиши сюда по-русски, бро..."
                ></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-translate" id="translateBtn" onclick="translateText()">
                    🔥 Перевести
                </button>
                <button class="btn btn-copy" id="copyBtn" onclick="copyText()">
                    📋 Копировать
                </button>
                <button class="btn btn-clear" onclick="clearAll()">
                    ✕ Очистить
                </button>
            </div>

            <div class="input-group">
                <div class="label output-label">
                    <span class="label-icon"></span>
                    Бурмалдатский перевод
                </div>
                <textarea 
                    id="outputText" 
                    placeholder="Тут будет бурмалдатский..." 
                    readonly
                ></textarea>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">символов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">слов</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== СЛОВАРЬ БУРМАЛДАТСКОГО ====================
        const REPLACEMENTS = {
            "я": "ч",
            "мне": "мье",
            "мы": "мч",
            "кто": "кьо",
            "это": "эьо",
            "что": "ято",
            "то": "ьо",
            "да": "дэ",
            "лет": "тет",
            "сек": "чек",
            "пшо": "его",
            "друг": "друн",
            "кот": "котость",
            "школа": "школость",
            "телефон": "бурмалдфон",
            "заяц": "бурмалдаяц",
            "птички": "бурмалдички",
            "зонтом": "зонтичностью",
            "внук": "внуч",
            "меллстрой": "меллстройность",
            "фамилия": "фомилия",
            "максим": "еле говрящий Максим",
            "эверест": "элевер",
            "чёрт": "тёлт",
            "черт": "тёлт",
            "блин": "бл*н",
            "тенге": "ценге",
            "манго": "maaaaaango",
            "парни": "барни",
            "хогвартс": "fogвартс",
            "роналдо": "рональжо",
            "жопа": "туз",
            "лайк": "лося",
            "пена": "пема",
            "берёза": "береза",
            "береза": "береза",
            "дуб": "дур",
            "мод": "мож",
            "гулять": "БЛЯДЬ гулять",
            "смеяться": "сметанаяйца",
            "старался": "стараласт",
            "старалась": "стараласт",
            "кинула": "кикула",
            "важнее": "вишнее",
            "нишевая": "нищая",
            "отлично": "бурмалда",
            "поганец": "понанец",
        };

        // Приветствия и прощания (НЕ получают "ность")
        const GREETINGS = new Set([
            "привет", "пока", "здравствуй", "здравствуйте", "здарова",
            "добрый", "доброе", "доброй", "доброго",
            "спокойной", "спокойного",
            "хелло", "hello", "hi", "hey", "йоу", "йо",
            "бай", "bye", "гудбай", "goodbye",
            "до", "свидания", "свиданья",
            "салют", "салам", "ку", "хай", "шалом",
            "вечер", "ночи", "утро", "день",
            "приветствую", "приветик", "прив",
            "здрасте", "здрасьте", "дарова",
        ]);

        // Вопросительные и относительные местоимения/наречия (НЕ получают "ность")
        const QUESTION_WORDS = new Set([
            "как", "какой", "какая", "какое", "какие",
            "каков", "какова", "каково", "каковы",
            "чей", "чья", "чьё", "чьи",
            "кем", "ком", "кому", "кого", "который",
            "которая", "которое", "которые",
            "где", "куда", "откуда",
            "когда", "зачем", "почему", "отчего",
            "сколько", "насколько",
            "который", "которая", "которое", "которые",
        ]);

        // Окончания причастий и деепричастий (не получают "ность")
        const PARTICIPLE_ENDINGS = [
            "вший", "вшая", "вшее", "вшие",
            "щий", "щая", "щее", "щие",
            "нный", "нная", "нное", "нные",
            "тый", "тая", "тое", "тые",
            "ая", "яя", "ущий", "ющий",
            "ав", "авши", "ев", "евши",
            "я", "а", "учи", "ючи",
        ];

        function isGreeting(word) {
            return GREETINGS.has(word.toLowerCase());
        }

        function isQuestionWord(word) {
            return QUESTION_WORDS.has(word.toLowerCase());
        }

        function isParticipleOrGerund(word) {
            const lower = word.toLowerCase();
            for (const ending of PARTICIPLE_ENDINGS) {
                if (lower.endsWith(ending) && lower.length > ending.length + 1) {
                    return true;
                }
            }
            return false;
        }

        function translateWord(word) {
            const isCapitalized = /^[А-ЯЁA-Z]/.test(word);
            const wordLower = word.toLowerCase();

            // 1. Точное совпадение в словаре → ПОЛНАЯ замена
            if (wordLower in REPLACEMENTS) {
                let result = REPLACEMENTS[wordLower];
                if (isCapitalized) {
                    result = result.charAt(0).toUpperCase() + result.slice(1);
                }
                return result;
            }

            // 2. Приветствие → не меняем
            if (isGreeting(wordLower)) {
                return word;
            }

            // 3. Вопросительное слово → не меняем
            if (isQuestionWord(wordLower)) {
                return word;
            }

            // 4. Причастие/деепричастие → не меняем
            if (isParticipleOrGerund(wordLower)) {
                return word;
            }

            // 5. Все остальные слова → добавляем "ность"
            const wordStripped = wordLower.replace(/[аеёиоуыэюяьъ]$/, '');
            const finalWord = (wordStripped.length >= 2 ? wordStripped : wordLower) + "ность";
            return isCapitalized ? finalWord.charAt(0).toUpperCase() + finalWord.slice(1) : finalWord;
        }

        function translateToBurmaldat(text) {
            const tokens = text.match(/[а-яА-ЯёЁa-zA-Z]+|[^а-яА-ЯёЁa-zA-Z]+/g) || [];
            return tokens.map(token => {
                if (/[а-яА-ЯёЁa-zA-Z]/.test(token)) {
                    return translateWord(token);
                }
                return token;
            }).join('');
        }

        function translateText() {
            const input = document.getElementById('inputText').value;
            const output = translateToBurmaldat(input);
            document.getElementById('outputText').value = output;
            updateStats(input);
        }

        function copyText() {
            const output = document.getElementById('outputText');
            output.select();
            document.execCommand('copy');
            showNotification();
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
            updateStats('');
        }

        function updateStats(text) {
            const chars = text.replace(/\s/g, '').length;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('charCount').textContent = chars;
            document.getElementById('wordCount').textContent = words;
        }

        function showNotification() {
            const notif = document.getElementById('notification');
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 2000);
        }

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        document.getElementById('inputText').addEventListener('input', function() {
            translateText();
        });

        function createParticles() {
            const container = document.getElementById('particles');
            const count = window.innerWidth < 600 ? 15 : 30;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
